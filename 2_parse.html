<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>步驟2｜結構化解析 v3.3</title>
<style>
:root{--bg:#f8f9fa;--s:#fff;--s2:#f1f3f4;--bd:#dadce0;--tx:#202124;--mu:#80868b;--acc:#1a73e8;--acc-l:#e8f0fe;--ok:#1e8e3e;--ok-l:#e6f4ea;--err:#d93025;--err-l:#fce8e6;--r:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Google Sans',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;min-height:100vh}
.shell{max-width:820px;margin:0 auto;padding:2rem 1.5rem}
.step-badge{display:inline-flex;align-items:center;gap:6px;background:#34a853;color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;margin-bottom:10px;letter-spacing:.04em}
h1{font-size:24px;font-weight:600;margin-bottom:6px}
.desc{font-size:13px;color:var(--mu)}
.next-steps{display:flex;gap:8px;margin-top:8px;font-size:12px;color:var(--mu);align-items:center;flex-wrap:wrap}
.next-steps span{background:var(--s2);padding:3px 10px;border-radius:20px;border:1px solid var(--bd)}
.next-steps span.done{background:var(--ok-l);color:var(--ok);border-color:#a8d5b5;cursor:pointer}
.next-steps span.cur{background:#34a853;color:#fff;border-color:#34a853}
.card{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:12px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-p{background:var(--acc);color:#fff}.btn-p:hover{background:#1557b0}.btn-p:disabled{background:#ccc;cursor:not-allowed}
.btn-o{background:var(--s);color:var(--tx);border:1px solid var(--bd)}.btn-o:hover{background:var(--s2)}
.btn-ok{background:var(--ok);color:#fff}.btn-ok:hover{background:#186e34}
.btn-sm{padding:5px 12px;font-size:12px}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.inp-area{width:100%;min-height:120px;padding:10px 12px;font-size:12px;font-family:monospace;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);resize:vertical;outline:none;line-height:1.6}
.inp-area:focus{border-color:var(--acc)}
.alert{padding:10px 14px;border-radius:var(--r);font-size:13px;margin-bottom:12px}
.alert-warn{background:#fef7e0;border:1px solid #fdd663;color:#7d4f00}
.alert-ok{background:var(--ok-l);border:1px solid #a8d5b5;color:var(--ok)}
.alert-info{background:var(--acc-l);border:1px solid #aecbfa;color:var(--acc)}
.next-btn-wrap{background:var(--ok-l);border:1px solid #a8d5b5;border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:1rem}
.next-btn-wrap p{font-size:13px;color:var(--ok);font-weight:500}
.next-btn-wrap span{font-size:12px;color:var(--mu)}
/* Order cards */
.order-card{border:1px solid var(--bd);border-radius:12px;margin-bottom:14px;overflow:hidden}
.order-card-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--s2);cursor:pointer;user-select:none}
.order-card-head .left{display:flex;align-items:center;gap:10px}
.order-card-head .src{font-size:13px;font-weight:500}
.order-card-head .meta{font-size:11px;color:var(--mu);font-family:monospace}
.order-card-head .chev{font-size:16px;color:var(--mu);transition:transform .2s}
.order-card.open .chev{transform:rotate(180deg)}
.order-card-body{display:none;padding:16px}
.order-card.open .order-card-body{display:block}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.field-row{display:flex;flex-direction:column;gap:3px}
.field-row.full{grid-column:span 2}
.field-label{font-size:11px;color:var(--mu);font-weight:500}
.field-val{padding:7px 10px;background:var(--s);border:1px solid var(--bd);border-radius:var(--r);font-size:13px;color:var(--tx);font-family:monospace;outline:none}
.field-val:focus{border-color:var(--acc)}
.items-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.items-table th{background:var(--s2);padding:7px 10px;text-align:left;font-weight:500;border-bottom:1px solid var(--bd);color:var(--mu);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.items-table td{padding:7px 10px;border-bottom:1px solid var(--bd)}
.items-table td input{width:100%;border:none;background:transparent;font-size:12px;font-family:monospace;color:var(--tx);outline:none}
.items-table td input:focus{background:var(--acc-l);border-radius:4px}
.items-table tr:last-child td{border-bottom:none}
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px}
.sum-cell{background:var(--s2);border:1px solid var(--bd);border-radius:var(--r);padding:8px 10px}
.sum-cell .sl{font-size:10px;color:var(--mu);margin-bottom:3px}
.sum-cell .sv input{width:100%;border:none;background:transparent;font-size:14px;font-weight:500;font-family:monospace;color:var(--tx);outline:none}
.section-title{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px}
.tok{background:var(--ok-l);color:var(--ok)}.tinfo{background:var(--acc-l);color:var(--acc)}
.total-display{font-weight:600;color:var(--acc)}
.summary-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--s2);border-radius:var(--r);margin-bottom:14px;font-size:13px}
.summary-bar b{color:var(--acc)}
</style>
</head>
<body>
<div class="shell">
  <div style="margin-bottom:1.5rem">
    <div class="step-badge">STEP 2 / 3</div>
    <h1>結構化解析 <span style="font-size:13px;font-weight:400;color:var(--mu)">v3.3</span></h1>
    <p class="desc">自動批次解析所有上傳的訂單，可逐筆展開修正後一起送到步驟 3。</p>
    <div class="next-steps">
      <span class="done" onclick="location.href='1_pdf_extract.html'">← ① 抽取文字</span>
      <span>→</span>
      <span class="cur">② 結構化解析</span>
      <span>→</span>
      <span>③ 寫入試算表</span>
    </div>
  </div>

  <!-- No data fallback -->
  <div class="card" id="no-data-card" style="display:none">
    <div class="alert alert-warn">⚠ 找不到從步驟 1 傳來的資料，請先回到步驟 1 上傳並抽取 PDF。</div>
    <div class="acts"><button class="btn btn-p" onclick="location.href='1_pdf_extract.html'">← 回到步驟 1</button></div>
  </div>

  <!-- Manual input fallback -->
  <div class="card" id="manual-card" style="display:none">
    <div class="card-title">手動貼上文字解析（單份）</div>
    <textarea class="inp-area" id="txt-input" placeholder="貼上訂單文字…"></textarea>
    <div class="acts">
      <button class="btn btn-p" onclick="parseManualText()">🔍 解析</button>
    </div>
  </div>

  <div id="summary-section" style="display:none">
    <div class="summary-bar">
      <span>共 <b id="sum-count">0</b> 份訂單</span>
      <span>總金額 <b id="sum-total">NT$0</b></span>
    </div>
  </div>

  <div id="orders-container"></div>

  <div class="next-btn-wrap" id="next-wrap" style="display:none">
    <div>
      <p>✅ 確認以上資料無誤後，前往步驟 3</p>
      <span id="next-sub">將所有解析結果寫入 Google 試算表</span>
    </div>
    <button class="btn btn-ok" onclick="goToStep3()">前往步驟 3：寫入試算表 →</button>
  </div>
</div>

<script>
let allOrders=[]; // {sourceName, order:{...}}

window.addEventListener('DOMContentLoaded',()=>{
  let data=[];
  try{data=JSON.parse(sessionStorage.getItem('extractedData')||'[]')}catch(e){}

  if(!data.length){
    document.getElementById('no-data-card').style.display='block';
    document.getElementById('manual-card').style.display='block';
    return;
  }

  // Auto-parse all files
  allOrders=data.map(f=>({
    sourceName:f.name,
    order:parseOrder(f.clean||f.raw||'',f.name)
  }));

  renderAll();
});

function parseManualText(){
  const txt=document.getElementById('txt-input').value.trim();
  if(!txt)return;
  allOrders=[{sourceName:'手動輸入',order:parseOrder(txt,'手動輸入')}];
  document.getElementById('manual-card').style.display='none';
  document.getElementById('no-data-card').style.display='none';
  renderAll();
}

function parseOrder(txt,filename){
  for(let i=0;i<5;i++){
    const prev=txt;
    txt=txt.replace(/(\S+(?:\s+\S+){0,3})\s+\1/g,'$1');
    if(txt===prev)break;
  }
  txt=txt.replace(/ {2,}/g,' ').trim();

  const g=(re)=>(txt.match(re)?.[1]||'');

  const order_id       = g(/#?(\d{10,})/);
  const order_date     = g(/(\d{4}-\d{2}-\d{2})/);
  const order_status   = g(/訂單狀態[:\s]*(\S+)/);
  const payment_status = g(/付款狀態[:\s]*(\S+)/);
  const buyer_name     = (txt.match(/訂購人[:\s]*([^\n訂單EMAIL電話]+)/)?.[1]||'').replace(/\s+/g,' ').trim();
  const buyer_email    = g(/EMAIL[:\s]*([^\s]+@[^\s]+)/i);
  const buyer_phone    = g(/電話號碼[:\s]*(\d+)/);
  const address        = (txt.match(/運送至[:\s]*(.+?)(?:送貨方式|收件人)/s)?.[1]||'').replace(/\s+/g,' ').trim();
  const recipient      = (txt.match(/收件人[:\s]*([^\s收件人電話]+)/)?.[1]||'').trim();
  const recipient_phone= g(/收件人電話號碼[:\s]*(\d+)/);
  const shipping_method= g(/送貨方式[:\s]*(\S+)/);
  const payment_method = g(/付款方式[:\s]*(\S+)/);

  const itemBlockRaw=(txt.match(/付款方式[:\s]*\S+(.*?)小計[：:]/s)||[])[1]||'';
  let itemBlock=itemBlockRaw.replace(/([A-Z0-9]{3,})-\s+([A-Z])/g,'$1-$2');
  itemBlock=itemBlock.replace(/商品貨號\s*數量\s*價格\s*小計/g,' ');
  itemBlock=itemBlock.replace(/店家和顧客訂單通訊內容.*/s,'').trim();

  const skuRe=/(?<!\w)([A-Z][A-Z0-9]{4,}(?:[-_/][A-Z0-9]+)*)/g;
  const skus=[...itemBlock.matchAll(skuRe)];
  const items=[];
  skus.forEach((m,i)=>{
    const sku=m[1];
    let nameRaw;
    if(i===0){
      nameRaw=itemBlock.slice(0,m.index);
    }else{
      const prevEnd=skus[i-1].index+skus[i-1][0].length;
      const seg=itemBlock.slice(prevEnd,m.index);
      const ntMatches=[...seg.matchAll(/NT\$[\d,]+/g)];
      const cut=ntMatches.length?prevEnd+ntMatches[ntMatches.length-1].index+ntMatches[ntMatches.length-1][0].length:prevEnd;
      nameRaw=itemBlock.slice(cut,m.index);
    }
    let name=nameRaw.replace(/\s+/g,' ').trim();
    name=name.replace(/\s*\*\d+包\s*$/,'').trim();
    name=name.replace(/^顧客訂單備註[:：][^銀加]*/,'').trim();
    name=name.replace(/^加購品\s*/,'').trim();

    const afterEnd=i<skus.length-1?skus[i+1].index:itemBlock.length;
    const after=itemBlock.slice(m.index+sku.length,afterEnd).trim();
    // Only extract prices BEFORE any Chinese text (next item name)
    const afterNum=after.replace(/[\u4e00-\u9fff\u3000-\u303f【】（）].*/s,'').trim();
    const qtyM=after.match(/^\s*(\d+)\s+NT\$/);
    const allPrices=[...afterNum.matchAll(/NT\$([\d,]+)/g)].map(m=>parseInt(m[1].replace(/,/g,'')));
    const qty=qtyM?parseInt(qtyM[1]):1;
    let unit_price=0,subtotal=0;
    if(allPrices.length>=3){
      // 3 prices: orig / unit(售價) / subtotal
      unit_price=allPrices[1];
      subtotal=allPrices[2];
    }else if(allPrices.length===2){
      if(allPrices[0]===allPrices[1]){
        // 相同價格：unit = sub
        unit_price=allPrices[0]; subtotal=allPrices[1];
      }else if(allPrices[1]===allPrices[0]*qty){
        // prices[1] = prices[0]*qty → 單價×數量=小計
        unit_price=allPrices[0]; subtotal=allPrices[1];
      }else{
        // prices[0]=原價, prices[1]=售價, subtotal=售價×數量
        unit_price=allPrices[1]; subtotal=allPrices[1]*qty;
      }
    }else if(allPrices.length===1){
      unit_price=allPrices[0];
      subtotal=allPrices[0]*qty;
    }
    items.push({name:name||sku,sku,qty,unit_price,subtotal});
  });

  const order_subtotal = parseInt((g(/小計[：:]\s*NT\$([\d,]+)/)||'0').replace(/,/g,''));

  // 折扣可能有多種：折抵購物金、點數折現等，全部抓出來加總
  const discountRe=/(折抵[^:：\d]*|點數折現[^:：\d]*|優惠[^:：\d]*折[扣現][^:：\d]*)[：:]\s*-?\s*NT\$([\d,]+)/g;
  const discountBreakdown=[];
  let dm;
  while((dm=discountRe.exec(txt))!==null){
    discountBreakdown.push({label:dm[1].trim(),amount:parseInt(dm[2].replace(/,/g,''))});
  }
  const discount=discountBreakdown.reduce((s,d)=>s+d.amount,0);

  const shipping_fee   = parseInt((g(/運費[：:]\s*NT\$([\d,]+)/)||'0').replace(/,/g,''));
  const total           = parseInt((g(/合計[：:]\s*NT\$([\d,]+)/)||'0').replace(/,/g,''));

  // 將折扣依商品小計比例分攤，重新計算每筆單價與小計
  // 折扣分攤：只分攤折抵金額，運費不分攤
  if(discount>0 && order_subtotal>0 && items.length){
    let allocatedSum=0;
    items.forEach((item,idx)=>{
      const ratio=item.subtotal/order_subtotal;
      let allocated;
      if(idx===items.length-1){
        allocated=discount-allocatedSum; // 最後一筆用餘數確保精確
      }else{
        allocated=Math.round(discount*ratio*10000)/10000;
        allocatedSum+=allocated;
      }
      const newSubtotal=Math.round(item.subtotal-allocated);
      const newUnitPrice=item.qty?Math.round((newSubtotal/item.qty)*10000)/10000:newSubtotal;
      item.subtotal=newSubtotal;
      item.unit_price=newUnitPrice;
    });
  }

  // 驗證：各商品小計加總應等於(訂單小計-折抵)，若有誤差則微調最後一筆
  const afterDiscountTotal=order_subtotal-discount;
  const sumCheck=items.reduce((s,i)=>s+i.subtotal,0);
  if(items.length && sumCheck!==afterDiscountTotal && afterDiscountTotal>0){
    const diff=afterDiscountTotal-sumCheck;
    items[items.length-1].subtotal+=diff;
    if(items[items.length-1].qty){
      items[items.length-1].unit_price=Math.round((items[items.length-1].subtotal/items[items.length-1].qty)*10000)/10000;
    }
  }

  return{order_id,order_date,order_status,payment_status,buyer_name,buyer_phone,buyer_email,recipient,recipient_phone,address,shipping_method,payment_method,items,order_subtotal,discount,discountBreakdown,shipping_fee,total,_source:filename};
}

function escAttr(t){return(t||'').toString().replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function nt(v){return(v!==''&&v!=null&&Number(v)!==0)?'NT$'+Math.round(Number(v)).toLocaleString():'—'}

function renderAll(){
  const container=document.getElementById('orders-container');
  container.innerHTML='';
  allOrders.forEach((entry,idx)=>{
    container.appendChild(buildOrderCard(entry,idx));
  });
  updateSummary();
  document.getElementById('summary-section').style.display=allOrders.length?'block':'none';
  document.getElementById('next-wrap').style.display=allOrders.length?'flex':'none';
  document.getElementById('next-sub').textContent='將 '+allOrders.length+' 份訂單寫入 Google 試算表';
}

function updateSummary(){
  document.getElementById('sum-count').textContent=allOrders.length;
  const total=allOrders.reduce((s,e)=>s+(Number(e.order.total)||0),0);
  document.getElementById('sum-total').textContent='NT$'+Math.round(total).toLocaleString();
}

function buildOrderCard(entry,idx){
  const o=entry.order;
  const div=document.createElement('div');
  div.className='order-card';
  div.id='order-card-'+idx;

  div.innerHTML=`
    <div class="order-card-head" onclick="toggleCard(${idx})">
      <div class="left">
        <span class="src">📄 ${entry.sourceName}</span>
        <span class="meta">${o.buyer_name||'—'} · #${o.order_id||'—'}</span>
        <span class="tag tok">${o.order_status||''}</span>
        <span class="tag tinfo">${o.payment_status||''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="total-display" id="card-total-${idx}">${nt(o.total)}</span>
        <span class="chev">⌄</span>
      </div>
    </div>
    <div class="order-card-body">
      <div class="field-grid">
        <div class="field-row"><div class="field-label">訂單編號</div><input class="field-val" id="f-${idx}-order_id" value="${escAttr(o.order_id)}"></div>
        <div class="field-row"><div class="field-label">訂單日期</div><input class="field-val" id="f-${idx}-order_date" value="${escAttr(o.order_date)}"></div>
        <div class="field-row"><div class="field-label">訂單狀態</div><input class="field-val" id="f-${idx}-order_status" value="${escAttr(o.order_status)}"></div>
        <div class="field-row"><div class="field-label">付款狀態</div><input class="field-val" id="f-${idx}-payment_status" value="${escAttr(o.payment_status)}"></div>
        <div class="field-row"><div class="field-label">訂購人</div><input class="field-val" id="f-${idx}-buyer_name" value="${escAttr(o.buyer_name)}"></div>
        <div class="field-row"><div class="field-label">電話</div><input class="field-val" id="f-${idx}-buyer_phone" value="${escAttr(o.buyer_phone)}"></div>
        <div class="field-row full"><div class="field-label">Email</div><input class="field-val" id="f-${idx}-buyer_email" value="${escAttr(o.buyer_email)}"></div>
        <div class="field-row"><div class="field-label">收件人</div><input class="field-val" id="f-${idx}-recipient" value="${escAttr(o.recipient)}"></div>
        <div class="field-row"><div class="field-label">收件人電話</div><input class="field-val" id="f-${idx}-recipient_phone" value="${escAttr(o.recipient_phone)}"></div>
        <div class="field-row full"><div class="field-label">收件地址</div><input class="field-val" id="f-${idx}-address" value="${escAttr(o.address)}"></div>
        <div class="field-row"><div class="field-label">送貨方式</div><input class="field-val" id="f-${idx}-shipping_method" value="${escAttr(o.shipping_method)}"></div>
        <div class="field-row"><div class="field-label">付款方式</div><input class="field-val" id="f-${idx}-payment_method" value="${escAttr(o.payment_method)}"></div>
      </div>

      <div class="section-title">商品明細</div>
      <div style="overflow-x:auto">
        <table class="items-table" id="items-table-${idx}">
          <thead><tr><th style="width:36%">商品名稱</th><th style="width:18%">貨號</th><th style="width:8%">數量</th><th style="width:14%">單價</th><th style="width:14%">小計</th><th style="width:10%"></th></tr></thead>
          <tbody id="items-body-${idx}"></tbody>
        </table>
      </div>
      <button class="btn btn-sm btn-o" style="margin-top:8px" onclick="addItemRow(${idx})">+ 新增商品</button>

      <div class="section-title">金額</div>
      ${(o.discountBreakdown&&o.discountBreakdown.length>1)?`<div style="font-size:11px;color:var(--mu);margin-bottom:6px">折扣明細：${o.discountBreakdown.map(d=>d.label+' -NT$'+d.amount.toLocaleString()).join('　|　')}</div>`:''}
      <div class="sum-grid">
        <div class="sum-cell"><div class="sl">訂單小計</div><div class="sv"><input id="f-${idx}-order_subtotal" value="${o.order_subtotal||0}" oninput="recalcTotal(${idx})"></div></div>
        <div class="sum-cell"><div class="sl">折抵（合計）</div><div class="sv"><input id="f-${idx}-discount" value="${o.discount||0}" oninput="recalcTotal(${idx})"></div></div>
        <div class="sum-cell"><div class="sl">運費</div><div class="sv"><input id="f-${idx}-shipping_fee" value="${o.shipping_fee||0}" oninput="recalcTotal(${idx})"></div></div>
        <div class="sum-cell" style="border-color:var(--acc)"><div class="sl" style="color:var(--acc)">合計</div><div class="sv" style="color:var(--acc)"><input id="f-${idx}-total" value="${o.total||0}" oninput="onTotalEdit(${idx})"></div></div>
      </div>

      <div class="acts">
        <button class="btn btn-sm btn-o" onclick="removeOrderCard(${idx})">🗑 移除此份訂單</button>
      </div>
    </div>`;

  // Fill items after insertion (need to attach to DOM first for ids)
  setTimeout(()=>{
    (o.items||[]).forEach(item=>addItemRow(idx,item));
  },0);

  return div;
}

function toggleCard(idx){
  document.getElementById('order-card-'+idx).classList.toggle('open');
}

function addItemRow(idx,item){
  item=item||{name:'',sku:'',qty:'',unit_price:'',subtotal:''};
  const tbody=document.getElementById('items-body-'+idx);
  const tr=document.createElement('tr');
  tr.innerHTML=`
    <td><input type="text" value="${escAttr(item.name)}" placeholder="商品名稱"></td>
    <td><input type="text" value="${escAttr(item.sku)}" placeholder="貨號"></td>
    <td><input type="number" value="${item.qty||''}" placeholder="0"></td>
    <td><input type="number" step="0.0001" value="${item.unit_price?parseFloat(item.unit_price).toFixed(4):''}" placeholder="0"></td>
    <td><input type="number" value="${item.subtotal||''}" placeholder="0"></td>
    <td><button onclick="this.closest('tr').remove()" style="background:none;border:none;cursor:pointer;color:var(--mu);font-size:16px">×</button></td>`;
  tbody.appendChild(tr);
}

function recalcTotal(idx){
  const sub=parseFloat(document.getElementById('f-'+idx+'-order_subtotal').value)||0;
  const disc=parseFloat(document.getElementById('f-'+idx+'-discount').value)||0;
  const ship=parseFloat(document.getElementById('f-'+idx+'-shipping_fee').value)||0;
  const total=sub-disc+ship;
  document.getElementById('f-'+idx+'-total').value=total;
  document.getElementById('card-total-'+idx).textContent=nt(total);
  allOrders[idx].order.total=total;
}
function onTotalEdit(idx){
  const v=parseFloat(document.getElementById('f-'+idx+'-total').value)||0;
  document.getElementById('card-total-'+idx).textContent=nt(v);
  allOrders[idx].order.total=v;
}

function removeOrderCard(idx){
  if(!confirm('確定要移除這份訂單嗎？'))return;
  allOrders.splice(idx,1);
  renderAll();
}

function collectFormData(idx){
  const get=f=>document.getElementById('f-'+idx+'-'+f)?.value||'';
  const rows=[...document.querySelectorAll('#items-body-'+idx+' tr')];
  const items=rows.map(tr=>{
    const inputs=tr.querySelectorAll('input');
    return{name:inputs[0].value,sku:inputs[1].value,qty:parseInt(inputs[2].value)||0,unit_price:parseFloat(parseFloat(inputs[3].value||0).toFixed(4))||0,subtotal:parseInt(inputs[4].value)||0};
  }).filter(i=>i.name||i.sku);

  return{
    order_id:get('order_id'),order_date:get('order_date'),order_status:get('order_status'),payment_status:get('payment_status'),
    buyer_name:get('buyer_name'),buyer_phone:get('buyer_phone'),buyer_email:get('buyer_email'),
    recipient:get('recipient'),recipient_phone:get('recipient_phone'),address:get('address'),
    shipping_method:get('shipping_method'),payment_method:get('payment_method'),
    items,
    order_subtotal:parseInt(get('order_subtotal'))||0,discount:parseInt(get('discount'))||0,
    shipping_fee:parseInt(get('shipping_fee'))||0,total:parseInt(get('total'))||0,
    _source:allOrders[idx].sourceName
  };
}

function goToStep3(){
  const finalOrders=allOrders.map((_,idx)=>collectFormData(idx));
  try{sessionStorage.setItem('parsedOrders',JSON.stringify(finalOrders))}catch(e){}
  window.location.href='3_sheets.html';
}
</script>
</body>
</html>
